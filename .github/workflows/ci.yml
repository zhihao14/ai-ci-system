name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ============================================================
  # Backend: Python 语法检查 + 依赖安装验证
  # ============================================================
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Syntax check all Python files
        run: |
          find backend/ -name "*.py" -not -path "*/__pycache__/*" | while read f; do
            python -m py_compile "$f"
          done
          echo "All Python files passed syntax check."

      - name: Verify imports
        run: |
          cd backend
          python -c "import fastapi, uvicorn, supabase, httpx, pydantic, anthropic, apscheduler; print('All backend imports OK')"

  # ============================================================
  # Crawler: Node.js 依赖安装验证
  # ============================================================
  crawler-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install shared crawler deps
        run: |
          cd crawler/shared && npm install
          cd ../douyin && npm install
          cd ../tiktok && npm install
          cd ../youtube && npm install
          cd ../xiaohongshu && npm install

      - name: Verify crawler scripts exist
        run: |
          test -f crawler/crawl.js
          test -f crawler/douyin/crawl_douyin.js
          test -f crawler/tiktok/crawl_tiktok.js
          test -f crawler/youtube/crawl_youtube.js
          test -f crawler/xiaohongshu/crawl_xiaohongshu.js
          echo "All crawler scripts verified."

  # ============================================================
  # Frontend: Next.js 类型检查 + 构建
  # ============================================================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Build Next.js
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
