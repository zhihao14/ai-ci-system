version: "3.9"

services:
  # ============================================================
  # 后端 (12 个 FastAPI 服务 + nginx 反代)
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    env_file:
      - .env
    volumes:
      - ./crawler/.browser-data:/app/crawler/.browser-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # 前端 (Next.js, 本地开发用 npm run dev)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_WS_URL=ws://localhost:8010/ws
    depends_on:
      - backend
    restart: unless-stopped
