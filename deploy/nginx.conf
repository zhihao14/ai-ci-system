worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # WebSocket 升级支持
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream srv_8000 { server 127.0.0.1:8000; }
    upstream srv_8001 { server 127.0.0.1:8001; }
    upstream srv_8002 { server 127.0.0.1:8002; }
    upstream srv_8003 { server 127.0.0.1:8003; }
    upstream srv_8004 { server 127.0.0.1:8004; }
    upstream srv_8005 { server 127.0.0.1:8005; }
    upstream srv_8006 { server 127.0.0.1:8006; }
    upstream srv_8007 { server 127.0.0.1:8007; }
    upstream srv_8008 { server 127.0.0.1:8008; }
    upstream srv_8009 { server 127.0.0.1:8009; }
    upstream srv_8010 { server 127.0.0.1:8010; }
    upstream srv_8011 { server 127.0.0.1:8011; }

    server {
        listen 80;
        server_name _;

        # 竞争对手情报分析 (8000)
        location /api/ {
            proxy_pass http://srv_8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 账号/视频模块 (8001)
        location /accounts/ {
            proxy_pass http://srv_8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 爆款分析模块 (8002)
        location /viral/ {
            proxy_pass http://srv_8002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 多平台采集 (8003)
        location /multi/ {
            proxy_pass http://srv_8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Router (8004)
        location /router/ {
            proxy_pass http://srv_8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 异常检测 (8005)
        location /anomaly/ {
            proxy_pass http://srv_8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI 内容生成 (8006)
        location /content/ {
            proxy_pass http://srv_8006/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Multi-Agent (8007)
        location /agents/ {
            proxy_pass http://srv_8007/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 用户系统 (8008)
        location /auth/ {
            proxy_pass http://srv_8008/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 自动监控 (8009)
        location /monitor/ {
            proxy_pass http://srv_8009/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket 实时通知 (8010)
        location /ws {
            proxy_pass http://srv_8010;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # API Marketplace (8011)
        location /market/ {
            proxy_pass http://srv_8011/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
